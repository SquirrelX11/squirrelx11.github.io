name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publish the built static site to the `gh-pages` branch with a plain git push.
# This avoids the flaky `actions/deploy-pages` polling that was timing out; GitHub
# then serves the site from the branch (Pages Source: Deploy from a branch → gh-pages).
permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # `.nojekyll` so GitHub Pages serves the Next.js `_next/` assets as-is
      # (Jekyll would otherwise ignore folders starting with an underscore).
      - name: Add .nojekyll
        run: touch out/.nojekyll
      - name: Publish out/ to gh-pages
        run: |
          cd out
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA} to Pages"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
